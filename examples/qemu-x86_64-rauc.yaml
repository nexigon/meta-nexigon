# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/refs/heads/master/kas/schema-kas.json
#
# Builds a QEMU x86_64 image with Nexigon Agent and RAUC A/B updates.

header:
  version: 14
  includes:
    - examples/include/rauc.yaml

local_conf_header:
  image-conf: |
    # Image ID used to identify the correct update artifacts.
    IMAGE_ID = "example-qemu-x86_64-rauc"
    # Filesystem types.
    IMAGE_FSTYPES = "tar.bz2 wic wic.xz"
    # Build OVMF firmware for QEMU pflash.
    EXTRA_IMAGEDEPENDS += "ovmf"
    # Use the RAUC-community GRUB config.
    PREFERRED_RPROVIDER_virtual-grub-bootconf = "rauc-qemu-grubconf"

machine: qemux86-64
distro: poky
target:
  - core-image-minimal
  - qemu-demo-bundle

defaults:
  repos:
    branch: scarthgap

repos:
  poky:
    url: https://github.com/yoctoproject/poky.git
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:
      meta-filesystems:

  # We need a sufficiently recent Rust version to compile Nexigon.
  meta-lts-mixins-rust:
    url: "https://git.yoctoproject.org/meta-lts-mixins"
    branch: scarthgap/rust

  meta-rauc:
    url: "https://github.com/rauc/meta-rauc.git"
    branch: scarthgap

  meta-rauc-community:
    url: "https://github.com/rauc/meta-rauc-community.git"
    branch: scarthgap
    layers:
      meta-rauc-qemux86:

  meta-nexigon:
    layers:
      meta-nexigon-core:
      meta-nexigon-rauc:
