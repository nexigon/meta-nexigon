# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/refs/heads/master/kas/schema-kas.json

header:
  version: 14
  includes:
    - examples/include/base.yaml

local_conf_header:
  nexigon-rugix-config: |
    # Enable Rugix distro feature.
    DISTRO_FEATURES:append = " rugix"
    # Timeout after which a rollback will be triggered if the system doesn't commit.
    NEXIGON_OTA_WATCHDOG_TIMEOUT = "1800s"
    # Rugix state management takes care of persisting the machine-id.
    NEXIGON_DEVICE_FINGERPRINT = "machine-id"
    # Install Rugix-specific Nexigon tooling.
    IMAGE_INSTALL:append = " nexigon-rugix-state-conf nexigon-rugix-ota nexigon-rugix-apps"
