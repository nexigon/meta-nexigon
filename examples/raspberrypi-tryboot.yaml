# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/refs/heads/master/kas/schema-kas.json
#
# Builds a Raspberry Pi image with Nexigon Agent and Rugix A/B updates.

header:
  version: 14
  includes:
    - examples/include/rugix.yaml

local_conf_header:
  raspberrypi: |
    DISTRO_FEATURES:append = " bluez5 bluetooth wifi "
    IMAGE_INSTALL:append = " bluez5 i2c-tools"
    ENABLE_UART = "1"
    LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"

  image-conf: |
    IMAGE_FSTYPES = "tar.bz2 wic wic.bmap rugixb rugixb.hash"
    # Override the A/B system partition size (default: 4GiB).
    # RUGIX_SYSTEM_SIZE = "4GiB"

machine: raspberrypi-armv8
distro: poky
target:
  - core-image-minimal

defaults:
  repos:
    branch: scarthgap

repos:
  poky:
    url: https://github.com/yoctoproject/poky.git
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-raspberrypi:
    url: "https://github.com/agherzan/meta-raspberrypi.git"

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:
      meta-filesystems:

  meta-lts-mixins-rust:
    url: "https://git.yoctoproject.org/meta-lts-mixins"
    branch: scarthgap/rust

  meta-rugix:
    url: "https://github.com/silitics/meta-rugix.git"
    branch: main
    layers:
      meta-rugix-core:
      meta-rugix-rpi-tryboot:

  meta-nexigon:
    layers:
      meta-nexigon-core:
      meta-nexigon-rugix:
