# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/refs/heads/master/kas/schema-kas.json
#
# Builds a QEMU x86_64 image with Nexigon Agent and Rugix A/B updates.
#
# Build:
#   just build examples/qemu-x86_64-rugix.yaml
#
# To connect to Nexigon Hub, set NEXIGON_HUB_URL and NEXIGON_TOKEN
# environment variables (e.g., via a `.env` file).

header:
  version: 14
  includes:
    - examples/include/rugix.yaml

local_conf_header:
  image-conf: |
    # Image ID used to identify the correct update artifacts.
    IMAGE_ID = "example-qemu-arm64"
    # Filesystem types including the Rugix update bundle.
    IMAGE_FSTYPES = "tar.bz2 wic wic.xz wic.bmap rugixb rugixb.hash"
    # Override the A/B system partition size (default: 4GiB).
    # RUGIX_SYSTEM_SIZE = "4GiB"
    # Build OVMF firmware for QEMU pflash.
    EXTRA_IMAGEDEPENDS += "ovmf"

machine: qemux86-64
distro: poky
target:
  - core-image-minimal

defaults:
  repos:
    branch: scarthgap

repos:
  poky:
    url: https://github.com/yoctoproject/poky.git
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:
      meta-filesystems:

  meta-lts-mixins-rust:
    url: "https://git.yoctoproject.org/meta-lts-mixins"
    branch: scarthgap/rust

  meta-lts-mixins-uboot:
    url: "https://git.yoctoproject.org/meta-lts-mixins"
    branch: scarthgap/u-boot

  meta-rugix:
    url: "https://github.com/silitics/meta-rugix.git"
    branch: main
    layers:
      meta-rugix-core:
      meta-rugix-qemu-x86_64-grub:

  meta-nexigon:
    layers:
      meta-nexigon-core:
      meta-nexigon-rugix:
