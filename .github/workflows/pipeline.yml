name: CI Pipeline

on:
  push:
  pull_request:
    branches: [main]

env:
  KAS_CONTAINER_ENGINE: podman
  KAS_WORK_DIR: ${{ github.workspace }}/_kas
  KAS_BUILD_DIR: ${{ github.workspace }}/build

jobs:
  build:
    name: Build
    runs-on: [self-hosted, nixos, yocto]
    environment: staging
    env:
      NEXIGON_HUB_URL: ${{ vars.NEXIGON_HUB_URL }}
      NEXIGON_TOKEN: ${{ secrets.NEXIGON_TOKEN }}
      NEXIGON_OTA_REPOSITORY: ${{ vars.NEXIGON_OTA_REPOSITORY }}
      NEXIGON_OTA_PACKAGE: ${{ vars.NEXIGON_OTA_PACKAGE }}
    strategy:
      matrix:
        config:
          - examples/qemu-x86_64-rauc.yaml
          - examples/qemu-x86_64-rugix.yaml
          - examples/raspberrypi-tryboot.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set IMAGE_VERSION
        run: echo "IMAGE_VERSION=build-$(date +%Y%m%d%H%M%S)-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Generate RAUC keys
        if: contains(matrix.config, 'rauc')
        run: just generate-rauc-keys

      - name: Build
        run: just build ${{ matrix.config }}
